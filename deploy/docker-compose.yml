services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sopa}
      POSTGRES_USER: ${POSTGRES_USER:-sopa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sopa}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  backend-api:
    build:
      context: ../backend
    environment:
      APP_ENV: ${APP_ENV:-dev}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://sopa:change-me@postgres:5432/sopa}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      JWT_SECRET: ${JWT_SECRET:-change-this-jwt-secret}
      INITIAL_ADMIN_USERNAME: ${INITIAL_ADMIN_USERNAME:-admin}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:-change-me-admin-password}
      LLM_PROVIDER: ${LLM_PROVIDER:-disabled}
      LLM_API_KEY: ${LLM_API_KEY:-}
      RAW_DOCS_DIR: /app/data/raw-docs
    ports:
      - "8000:8000"
    volumes:
      - raw-docs:/app/data/raw-docs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build:
      context: ../backend
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=INFO
    environment:
      APP_ENV: ${APP_ENV:-dev}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://sopa:change-me@postgres:5432/sopa}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      JWT_SECRET: ${JWT_SECRET:-change-this-jwt-secret}
      LLM_PROVIDER: ${LLM_PROVIDER:-disabled}
      LLM_API_KEY: ${LLM_API_KEY:-}
      RAW_DOCS_DIR: /app/data/raw-docs
    volumes:
      - raw-docs:/app/data/raw-docs
    depends_on:
      - backend-api
      - redis

  scheduler:
    build:
      context: ../backend
    command: celery -A app.workers.celery_app.celery_app beat --loglevel=INFO
    environment:
      APP_ENV: ${APP_ENV:-dev}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://sopa:change-me@postgres:5432/sopa}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      JWT_SECRET: ${JWT_SECRET:-change-this-jwt-secret}
      DEFAULT_CRAWL_CRON: ${DEFAULT_CRAWL_CRON:-0 3 * * 1}
    depends_on:
      - backend-api
      - redis

  frontend:
    build:
      context: ../frontend
    ports:
      - "8080:80"
    depends_on:
      - backend-api

volumes:
  postgres-data:
  redis-data:
  raw-docs:

