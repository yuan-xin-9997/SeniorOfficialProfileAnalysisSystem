apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduler
  namespace: sopa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scheduler
  template:
    metadata:
      labels:
        app: scheduler
    spec:
      containers:
        - name: scheduler
          image: sopa-backend:0.1.5
          imagePullPolicy: IfNotPresent
          command: ["celery"]
          args: ["-A", "app.workers.celery_app.celery_app", "beat", "--loglevel=INFO"]
          envFrom:
            - configMapRef:
                name: sopa-config
            - secretRef:
                name: sopa-secret
