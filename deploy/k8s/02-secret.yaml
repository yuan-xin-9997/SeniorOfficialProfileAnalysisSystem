apiVersion: v1
kind: Secret
metadata:
  name: sopa-secret
  namespace: sopa
type: Opaque
stringData:
  POSTGRES_DB: "sopa"
  POSTGRES_USER: "sopa"
  POSTGRES_PASSWORD: "change-me"
  DATABASE_URL: "postgresql+psycopg://sopa:change-me@postgres:5432/sopa"
  REDIS_URL: "redis://redis:6379/0"
  JWT_SECRET: "change-this-jwt-secret"
  INITIAL_ADMIN_USERNAME: "admin"
  INITIAL_ADMIN_PASSWORD: "change-me-admin-password"
  LLM_API_KEY: ""

